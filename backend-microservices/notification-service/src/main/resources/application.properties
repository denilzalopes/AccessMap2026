spring.application.name=notification-service
server.port=8084
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/accessmap}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:accessmap}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.jpa.hibernate.ddl-auto=update
spring.threads.virtual.enabled=true
# Configuration Mailtrap (dev) — remplacer par SMTP réel en production
spring.mail.host=${MAIL_HOST:smtp.mailtrap.io}
spring.mail.port=${MAIL_PORT:2525}
spring.mail.username=${MAIL_USERNAME:your_mailtrap_username}
spring.mail.password=${MAIL_PASSWORD:your_mailtrap_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
springdoc.swagger-ui.path=/swagger-ui.html
management.endpoints.web.exposure.include=health,info

# CORS
spring.web.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
