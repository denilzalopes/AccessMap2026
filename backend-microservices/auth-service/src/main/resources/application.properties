spring.application.name=auth-service
server.port=8080

# Database configuration
spring.datasource.url=jdbc:postgresql://postgres:5432/accessmap_auth
spring.datasource.username=accessmap
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT configuration
app.jwt.secret=YourSuperSecretKeyThatIsAtLeast256BitsLongAndShouldBeStoredInEnvironmentVariables
app.jwt.expiration=900000 # 15 minutes
app.jwt.refresh-expiration=604800000 # 7 days

# Swagger UI configuration
springdoc.swagger-ui.path=/swagger-ui.html
