# ── Base de données ──────────────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/accessmap}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:accessmap}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── Virtual Threads (Project Loom) ───────────────────────────────────────────
spring.threads.virtual.enabled=true

# ── JWT ──────────────────────────────────────────────────────────────────────
# Clé Base64 de minimum 256 bits — TOUJOURS via variable d'environnement !
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration=${APP_JWT_EXPIRATION:900000}
app.jwt.refresh-expiration=${APP_JWT_REFRESH_EXPIRATION:604800000}

# ── Swagger / OpenAPI ────────────────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# ── Actuator ────────────────────────────────────────────────────────────────
